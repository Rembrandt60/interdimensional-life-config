name: Refresh live config

on:
  workflow_dispatch:
    inputs:
      share_url:
        description: "Optional override for the public share URL"
        required: false
      fallback_video_id:
        description: "Optional override for the fallback YouTube video ID"
        required: false
      channel_id:
        description: "Optional override for the YouTube channel ID"
        required: false
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh live-config.json
        env:
          INPUT_SHARE_URL: ${{ github.event.inputs.share_url }}
          INPUT_FALLBACK_VIDEO_ID: ${{ github.event.inputs.fallback_video_id }}
          INPUT_CHANNEL_ID: ${{ github.event.inputs.channel_id }}
        run: python scripts/refresh_live_config.py

      - name: Commit and push when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-config.json
          git diff --cached --quiet || git commit -m "Refresh live config"
          git push
